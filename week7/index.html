<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JAudio on website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Space+Grotesk&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <!-- defer: dont forget it! -->
  </head>
  <body>
    <h1>Learning to play audio on a website!</h1>

    <audio src="airport.mp3" controls id="airport-audio"></audio>
    <!-- add controls between src and id to make audio visible, delete to hide -->
    <button id="play-button">FLIGHT!!</button>
    <button id="pause-button">no flight :c</button>

    <audio src="pop.mp3" id="pop-audio"></audio>
    <button id="pop-button">pop sound</button>
    <p id="msg"></p>
    <video src="stardust.mp4" controls id="my-video"></video>

    <button id="play-pause-button">
      <img
        id="play-pause-img"
        src="https://img.icons8.com/?size=100&id=TlSnjmNzYgKT&format=png&color=000000"
        alt="Play Button"
        width="24"
        height="24"
      />
    </button>
  </body>
</html>
